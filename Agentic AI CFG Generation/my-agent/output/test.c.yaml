methods:
    - method:
        id: M1
        entry: N1
        exit: N3
        name: "basic"
        type: "void"
        nodes:
            N1:
                type: "entry"
                arguments: []
                next: N2
            N2:
                type: "block"
                statements:
                    - "int x = 1"
                    - "int y = 2"
                    - "printf(x + y)"
                next: N3
            N3:
                type: "exit"
                return: []
                next: null
    - method:
        id: M2
        entry: N1
        exit: N6
        name: "decrement"
        type: "int"
        nodes:
            N1:
                type: "entry"
                arguments:
                    - argument:
                        name: start_number
                        type: int
                    - argument:
                        name: times
                        type: int
                next: N2
            N2:
                type: "block"
                statements:
                    - "int value = start_number"
                next: N3
            N3:
                type: "loop"
                iteratorStart: "int i = 0"
                iteratorUpdate: "i++"
                startPredicate: N3a
                predicates:
                    - predicate:
                        ID: N3a
                        statement: "i < times"
                        onTrue: N4
                        onFalse: N5
            N4:
                type: "block"
                statements:
                    - "value--"
                next: N3
            N5:
                type: "block"
                statements: []
                next: N6
            N6:
                type: "exit"
                return:
                    - variable:
                        name: value
                        type: int
                next: null
    - method:
        id: M3
        entry: N1
        exit: N7
        name: "conditional1"
        type: "int"
        nodes:
            N1:
                type: "entry"
                arguments:
                    - argument:
                        name: x
                        type: int
                    - argument:
                        name: y
                        type: int
                next: N2
            N2:
                type: "conditional"
                startPredicate: N2a
                predicates:
                    - predicate:
                        ID: N2a
                        statement: "x + y > 0"
                        onTrue: N3
                        onFalse: N5
            N3:
                type: "block"
                statements:
                    - "printf(\"positive\")"
                next: N4
            N4:
                type: "block"
                statements:
                    - "int _return_val = 1"
                next: N7
            N5:
                type: "block"
                statements:
                    - "printf(\"negative\")"
                next: N6
            N6:
                type: "block"
                statements:
                    - "int _return_val = 0"
                next: N7
            N7:
                type: "exit"
                return:
                    - variable:
                        name: _return_val
                        type: int
                next: null
    - method:
        id: M4
        entry: N1
        exit: N10
        name: "conditional2"
        type: "void"
        nodes:
            N1:
                type: "entry"
                arguments:
                    - argument:
                        name: x
                        type: int
                    - argument:
                        name: y
                        type: int
                next: N2
            N2:
                type: "conditional"
                startPredicate: N2a
                predicates:
                    - predicate:
                        ID: N2a
                        statement: "x > 0"
                        onTrue: N3
                        onFalse: N2b
                    - predicate:
                        ID: N2b
                        statement: "y < 0"
                        onTrue: N3
                        onFalse: N5
            N3:
                type: "block"
                statements:
                    - "printf(\"first true\")"
                next: N4
            N4:
                type: "block"
                statements: []
                next: N10
            N5:
                type: "conditional"
                startPredicate: N5a
                predicates:
                    - predicate:
                        ID: N5a
                        statement: "x < 0"
                        onTrue: N5b
                        onFalse: N8
                    - predicate:
                        ID: N5b
                        statement: "y > 0"
                        onTrue: N6
                        onFalse: N8
            N6:
                type: "block"
                statements:
                    - "printf(\"second true\")"
                next: N7
            N7:
                type: "block"
                statements: []
                next: N10
            N8:
                type: "block"
                statements:
                    - "printf(\"both false\")"
                next: N9
            N9:
                type: "block"
                statements: []
                next: N10
            N10:
                type: "exit"
                return: []
                next: null